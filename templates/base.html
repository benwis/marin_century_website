<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Marin Century</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />

        <meta property="og:title" content="Marin Century" />
        <meta property="og:type" content="website" />
        <meta
            property="og:image"
            content="https://marincentury.com/img/MC24_ChilenoJerseys.jpg"
        />
        <meta property="og:url" content="https://marincentury.com" />
        <meta
            property="og:description"
            content="The Marin Century is one of the premier centuries in Northern California, featuring iconic Bay Area routes and an amazing atmosphere."
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&family=BBH+Sans+Bogle&family=BBH+Sans+Hegarty&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="{{ get_url(path="style.css", cachebust=true) }}">
            <!-- Google tag (gtag.js) -->
            <script
                async
                src="https://www.googletagmanager.com/gtag/js?id=G-D8T7SPST03"
            ></script>
            <script>
                window.dataLayer = window.dataLayer || [];
                function gtag() {
                    dataLayer.push(arguments);
                }
                gtag("js", new Date());

                gtag("config", "G-D8T7SPST03");
            </script>
            <!-- Persist UTM tags-->
            <script>
            /**
             * Marin Century UTM → RedPodium PreFill Passthrough
             *
             * Captures UTM parameters from the current marincentury.com URL and appends them
             * to RedPodium registration links so attribution carries into registration.
             *
             * Sends BOTH:
             *   1) A readable composite string in the hidden field (registrants.source),
             *      e.g. source:postcard|medium:print|content:novato-bikeworks|campaign:2026mc
             *   2) The raw utm_* params (and common click IDs) as separate query params,
             *      so RedPodium / GA4 can read them natively.
             *
             * Single-visit attribution only — no localStorage, no referrer inference.
             * Recovers UTMs from malformed hash URLs like /#register?utm_source=postcard
             * because the site nav uses hash anchors (#routes, #register, etc.).
             *
             * FIELD_NAME is confirmed to match the RedPodium hidden field.
             */
            (function () {
              "use strict";

              // ── CONFIGURATION ──────────────────────────────
              var REDPODIUM_HOST = "marincentury.redpodium.com";
              var FIELD_NAME = "registrants.source";
              // ───────────────────────────────────────────────

              var UTM_KEYS = [
                "utm_source",
                "utm_medium",
                "utm_content",
                "utm_campaign",
                "utm_term"
              ];

              var CLICK_ID_KEYS = [
                "gclid",
                "gbraid",
                "wbraid",
                "fbclid",
                "mc_cid",
                "mc_eid"
              ];

              // Light sanitizing so the composite value can't break the key:value|... format.
              function clean(value) {
                return String(value)
                  .replace(/[|:]/g, "-")
                  .replace(/\s+/g, "_")
                  .substring(0, 120);
              }

              // Reads params from the query string AND from a malformed hash like
              // /#register?utm_source=postcard. Real query string wins on conflicts.
              function getAllParams() {
                var params = new URLSearchParams(window.location.search);

                if (window.location.hash && window.location.hash.indexOf("?") !== -1) {
                  var hashQuery = window.location.hash.split("?").slice(1).join("?");
                  var hashParams = new URLSearchParams(hashQuery);
                  hashParams.forEach(function (value, key) {
                    if (!params.has(key)) params.set(key, value);
                  });
                }

                return params;
              }

              function hostFromUrl(url) {
                try {
                  return new URL(url).hostname.replace(/^www\./, "");
                } catch (e) {
                  return "";
                }
              }

              // Fallback when no UTMs are present: classify document.referrer into
              // organic / social / referral / direct. Returns [] for direct (own site,
              // RedPodium, or no referrer) so nothing gets tagged in that case.
              function inferFromReferrer() {
                var refHost = hostFromUrl(document.referrer);
                var ownHost = window.location.hostname.replace(/^www\./, "");

                if (!refHost || refHost === ownHost || refHost === REDPODIUM_HOST) {
                  return [];
                }

                var searchEngines = {
                  "google.com": "google",
                  "bing.com": "bing",
                  "duckduckgo.com": "duckduckgo",
                  "search.yahoo.com": "yahoo",
                  "yahoo.com": "yahoo",
                  "ecosia.org": "ecosia"
                };

                var socialSites = {
                  "facebook.com": "facebook",
                  "m.facebook.com": "facebook",
                  "instagram.com": "instagram",
                  "l.instagram.com": "instagram",
                  "linkedin.com": "linkedin",
                  "t.co": "twitter",
                  "x.com": "x",
                  "twitter.com": "twitter"
                };

                var source = refHost;
                var medium = "referral";

                Object.keys(searchEngines).forEach(function (host) {
                  if (refHost === host || refHost.endsWith("." + host)) {
                    source = searchEngines[host];
                    medium = "organic";
                  }
                });

                Object.keys(socialSites).forEach(function (host) {
                  if (refHost === host || refHost.endsWith("." + host)) {
                    source = socialSites[host];
                    medium = "social";
                  }
                });

                return [
                  "source:" + clean(source),
                  "medium:" + clean(medium)
                ];
              }

              document.addEventListener("DOMContentLoaded", function () {
                var params = getAllParams();

                // Build the readable composite string from whatever UTMs are present.
                var parts = [];
                UTM_KEYS.forEach(function (key) {
                  var val = params.get(key);
                  if (val) parts.push(key.replace("utm_", "") + ":" + clean(val));
                });

                // Collect raw params to pass through natively.
                var passthrough = {};
                UTM_KEYS.concat(CLICK_ID_KEYS).forEach(function (key) {
                  var val = params.get(key);
                  if (val) passthrough[key] = val;
                });

                // No UTM composite present — fall back to referrer inference.
                // (UTM always wins; inference only fills the gap.)
                if (parts.length === 0) {
                  parts = inferFromReferrer();
                }

                // Nothing to attribute — leave links untouched.
                if (parts.length === 0 && Object.keys(passthrough).length === 0) return;

                var sourceValue = parts.join("|");

                function tagLink(link) {
                  if (!link || !link.href) return;
                  try {
                    var url = new URL(link.href);

                    // Exact host match — avoids tagging unrelated links that merely
                    // contain the substring "redpodium".
                    if (url.hostname !== REDPODIUM_HOST) return;

                    // Set the composite hidden field (don't overwrite if already tagged).
                    if (sourceValue && !url.searchParams.has(FIELD_NAME)) {
                      url.searchParams.set(FIELD_NAME, sourceValue);
                    }

                    // Pass through raw utm_* and click IDs (don't overwrite existing).
                    Object.keys(passthrough).forEach(function (key) {
                      if (!url.searchParams.has(key)) {
                        url.searchParams.set(key, passthrough[key]);
                      }
                    });

                    link.href = url.toString();
                  } catch (e) {
                    // Skip malformed URLs.
                  }
                }

                function tagLinks(root) {
                  var scope = root || document;
                  if (!scope.querySelectorAll) return;
                  scope.querySelectorAll("a[href]").forEach(tagLink);
                }

                // Tag links present at load.
                tagLinks();

                // Tag links added later (dynamic nav, etc.).
                var observer = new MutationObserver(function (mutations) {
                  mutations.forEach(function (m) {
                    m.addedNodes.forEach(function (node) {
                      if (node.nodeType === 1) tagLinks(node);
                    });
                  });
                });

                observer.observe(document.body, { childList: true, subtree: true });
              });
            })();
            </script>

    </head>

    <body>
        <section class="section">
            <div class="container">
                {% block content %} {% endblock content %}
            </div>
        </section>
    </body>
</html>
